name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (example: 0.1.0)
        required: true
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Install extension dependencies
        run: npm --prefix extension install

      - name: Generate icon set
        run: npm run icons:generate

      - name: Validate release pipeline
        run: npm run release:dry-run -- --validate-only

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Package extension
        run: npm run extension:package

      - name: Generate checksums
        run: npm run release:sign

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: axis-release-artifacts
          path: |
            dist/axis-vscode-extension.vsix
            dist/checksums.txt

      - name: Publish VS Code extension
        if: ${{ env.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          cd extension
          npx @vscode/vsce publish --pat "$VSCE_PAT"
