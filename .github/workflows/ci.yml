name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Install extension dependencies
        run: npm --prefix extension install

      - name: Generate icon set
        run: npm run icons:generate

      - name: Axis diff enforcement (CI strict)
        id: axis_enforcement
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p dist
          set +e
          node scripts/axis-validate-diff.mjs \
            --json \
            --strict \
            --base-ref origin/main \
            --head-ref HEAD > dist/axis-ci-enforcement-report.json
          status=$?
          set -e
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: Upload axis enforcement report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axis-ci-enforcement-report
          path: dist/axis-ci-enforcement-report.json

      - name: Fail on axis enforcement drift
        if: steps.axis_enforcement.outputs.exit_code != '0'
        run: |
          echo "Axis enforcement failed. See artifact: axis-ci-enforcement-report"
          exit 1

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Package extension
        run: npm run extension:package

      - name: Release dry-run
        run: npm run release:dry-run -- --validate-only
