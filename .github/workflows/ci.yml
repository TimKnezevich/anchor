name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Install extension dependencies
        run: npm --prefix extension install

      - name: Generate icon set
        run: npm run icons:generate

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Package extension
        run: npm run extension:package

      - name: Release dry-run
        run: npm run release:dry-run -- --validate-only
